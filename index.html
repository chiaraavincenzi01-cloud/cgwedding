<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiara & Gregorio | Wedding Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --salvia: #9db2a2;
            --perla: #fdfcf9;
            --arancio: #f4b084;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--perla); font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- BUSTA LUXURY FULL SCREEN --- */
        #envelope-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #e2dfd5;
            z-index: 5000;
            display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .envelope {
            position: relative;
            width: 90vw; max-width: 550px;
            height: 350px;
            background: #fff;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0; width: 0; height: 0;
            border-top: 180px solid #f9f7f2;
            border-left: 275px solid transparent;
            border-right: 275px solid transparent;
            z-index: 2;
        }

        .wax-seal {
            position: absolute;
            top: 150px; left: 50%;
            transform: translateX(-50%);
            width: 85px; height: 85px;
            background: var(--arancio);
            border-radius: 50%;
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
            color: white; font-family: 'Cormorant Garamond'; font-size: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .wax-seal::after {
            content: "🌿";
            position: absolute;
            bottom: -10px; font-size: 1.6rem;
        }

        /* --- SITO PRINCIPALE --- */
        #main-site { display: none; opacity: 0; transition: opacity 1.5s; text-align: center; }

        /* HERO CON LA TUA IMMAGINE a.jpg */
        .hero-section {
            width: 100%; height: 100vh;
            background: url('a.jpg') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            position: relative;
        }

        .hero-text-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 40px; width: 80%; max-width: 600px;
            border: 1px solid var(--salvia);
            margin-bottom: 50px;
        }

        h1 { font-family: 'Cormorant Garamond'; font-size: 3.5rem; color: var(--salvia); margin: 0; }

        .countdown-regal {
            background: var(--salvia); color: white; padding: 30px;
            display: flex; justify-content: space-around;
            max-width: 600px; margin: 30px auto;
            border: 1px solid white; outline: 2px solid var(--salvia); outline-offset: 5px;
        }

        .time-item span { display: block; font-size: 2.5rem; font-family: 'Cormorant Garamond'; }

        /* Petali */
        .petal {
            position: fixed; width: 12px; height: 12px; background: #fff;
            border-radius: 150% 0 150% 100%; z-index: 1000; pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="envelope-wrapper" onclick="startExperience()">
        <div class="envelope">
            <div class="wax-seal">C & G</div>
        </div>
    </div>

    <audio id="wedding-music" loop>
        <source src="https://www.mboxdrive.com/Elvis%20Presley%20-%20Can't%20Help%20Falling%20In%20Love%20(Instrumental).mp3" type="audio/mpeg">
    </audio>

    <div id="main-site">
        <div class="hero-section">
            <div class="hero-text-card">
                <p style="letter-spacing: 5px;">3 OTTOBRE 2026</p>
                <h1>Chiara & Gregorio</h1>
            </div>
        </div>

        <div class="countdown-regal">
            <div class="time-item"><span id="days">00</span>GIORNI</div>
            <div class="time-item"><span id="hours">00</span>ORE</div>
            <div class="time-item"><span id="minutes">00</span>MINUTI</div>
        </div>

        <div style="padding: 60px 20px;">
            <h2 style="font-family: 'Cormorant Garamond'; color: var(--salvia); font-size: 2.5rem;">I Luoghi</h2>
            <p><strong>Cerimonia:</strong> Santrovaso di Preganziol (TV)</p>
            <p><strong>Ricevimento:</strong> Villa Luppis - Pasiano di Pordenone (PN)</p>
            
            <div style="background: #f4f6f4; padding: 30px; border: 1px dashed var(--salvia); max-width: 500px; margin: 40px auto;">
                <p>IBAN: IT 00 X 00000 00000 000000000000</p>
                <p>Intestato a Chiara e Gregorio</p>
            </div>
        </div>
    </div>

    <script>
        function startExperience() {
            // Nasconde busta
            document.getElementById('envelope-wrapper').style.transform = 'translateY(-100%)';
            // Play musica
            document.getElementById('wedding-music').play();
            // Mostra sito
            const main = document.getElementById('main-site');
            main.style.display = 'block';
            setTimeout(() => { main.style.opacity = '1'; }, 100);
            
            startCountdown();
            spawnPetals();
        }

        function startCountdown() {
            const target = new Date("October 3, 2026 11:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const d = target - now;
                document.getElementById('days').innerText = Math.floor(d / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('minutes').innerText = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            }, 1000);
        }

        function spawnPetals() {
            for(let i=0; i<25; i++) {
                let p = document.createElement("div");
                p.className = "petal";
                p.style.left = Math.random() * 100 + "vw";
                p.style.animationDuration = (Math.random() * 3 + 5) + "s";
                p.style.animationDelay = Math.random() * 5 + "s";
                document.body.appendChild(p);
            }
        }
    </script>
</body>
</html>
