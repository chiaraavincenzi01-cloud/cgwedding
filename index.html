<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chiara & Gregorio | 03.10.2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Montserrat:wght@100;300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --salvia: #9db2a2;
            --salvia-deep: #7a8f80;
            --perla: #fdfcf9;
            --arancio-pastello: #f4b084;
            --oro-ghirigori: rgba(212, 175, 55, 0.3);
            --testo: #4a4a4a;
            --transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--perla); font-family: 'Cormorant Garamond', serif; color: var(--testo); overflow-x: hidden; }

        /* --- BUSTA INITIALE --- */
        #busta-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e5e2d9; z-index: 10000; display: flex; justify-content: center; align-items: center;
            transition: var(--transition);
        }
        .envelope { position: relative; width: 100%; height: 100%; background: #f9f7f2; }
        .flap { position: absolute; width: 100%; height: 100%; background: #fdfcf9; transition: var(--transition); z-index: 5; }
        .flap.top { top: 0; left: 0; height: 55%; clip-path: polygon(0 0, 100% 0, 50% 100%); transform-origin: top; }
        .flap.bottom { bottom: 0; left: 0; height: 55%; clip-path: polygon(0 100%, 100% 100%, 50% 0); z-index: 4; }
        .flap.left { top: 0; left: 0; width: 55%; clip-path: polygon(0 0, 0 100%, 100% 50%); z-index: 3; background: #f4f2eb; }
        .flap.right { top: 0; right: 0; width: 55%; clip-path: polygon(100% 0, 100% 100%, 0 50%); z-index: 3; background: #f4f2eb; }

        .wax-seal {
            position: absolute; z-index: 10; cursor: pointer; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 120px; background: var(--arancio-pastello); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .wax-seal::after { content: "🌿"; position: absolute; top: -10px; right: -5px; font-size: 2.5rem; }
        .wax-seal span { font-size: 1.8rem; color: white; font-weight: bold; }
        .aperta#busta-container { transform: translateY(-100%); }

        /* --- SITO --- */
        #sito-reale { opacity: 0; transition: opacity 2s ease; }
        
        .hero {
            height: 70vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden; background: white;
        }
        .hero-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('a.jpg.jpeg') no-repeat center center; background-size: cover;
            opacity: 0.35; z-index: 1;
        }
        .hero-content { z-index: 2; text-align: center; }
        .benvenuti { font-size: 1rem; letter-spacing: 6px; text-transform: uppercase; font-family: 'Montserrat'; font-weight: 300; line-height: 2; }
        .nomi { font-family: 'Pinyon Script', cursive; font-size: 5rem; color: var(--salvia-deep); margin: 20px 0; }
        .data-nozze { font-size: 1.4rem; letter-spacing: 3px; font-weight: 300; }

        /* --- SEZIONE COUNTDOWN (Basso immagine, prima della cerimonia) --- */
        .countdown-section { padding: 50px 20px; text-align: center; background: var(--perla); }
        .countdown-container {
            background: var(--salvia); border: 1px solid var(--arancio-pastello);
            max-width: 650px; margin: 0 auto; padding: 30px 10px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .count-box span { display: block; font-size: 2.5rem; font-weight: 300; color: var(--arancio-pastello); font-family: 'Cormorant Garamond'; }
        .count-box label { font-family: 'Montserrat'; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: white; }

        /* --- GALLERIA D'AMORE (Sfondo Arancio e Ghirigori Oro) --- */
        .gallery-section {
            background-color: var(--arancio-pastello);
            background-image: url("https://www.transparenttextures.com/patterns/floral-paper.png"); /* Effetto ghirigori */
            padding: 80px 0; overflow: hidden; position: relative;
            border-top: 1px solid var(--oro-ghirigori); border-bottom: 1px solid var(--oro-ghirigori);
        }
        .gallery-title { font-family: 'Pinyon Script', cursive; font-size: 4rem; color: white; text-align: center; margin-bottom: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        
        .slider { display: flex; width: calc(250px * 10); animation: scroll 30s linear infinite; }
        .slider:hover { animation-play-state: paused; }
        .slide { width: 230px; height: 300px; margin: 0 15px; flex-shrink: 0; border: 10px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: rotate(-2deg); transition: 0.5s; }
        .slide:nth-child(even) { transform: rotate(3deg); }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide:hover { transform: scale(1.05) rotate(0deg); z-index: 10; }
