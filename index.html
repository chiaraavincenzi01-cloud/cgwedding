<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiara & Gregorio | Wedding Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --salvia: #9db2a2;
            --perla: #fdfcf9;
            --arancio-pastello: #f4b084;
            --testo: #4a4a4a;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--perla); font-family: 'Montserrat', sans-serif;
            color: var(--testo); overflow-x: hidden;
        }

        /* --- BUSTA LUXURY --- */
        #envelope-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e2dfd5; /* Effetto tavolo */
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .envelope {
            position: relative; width: 90vw; max-width: 600px; height: 380px;
            background: white; box-shadow: 0 50px 100px rgba(0,0,0,0.15);
        }

        /* Flap della busta */
        .envelope::before {
            content: ""; position: absolute; top: 0; width: 0; height: 0;
            border-top: 200px solid #f9f7f2;
            border-left: 300px solid transparent; border-right: 300px solid transparent;
            z-index: 2; left: 0;
        }

        /* Sigillo Ceralacca */
        .wax-seal {
            position: absolute; top: 170px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 90px; background: var(--arancio-pastello);
            border-radius: 50%; z-index: 10; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: white; font-family: 'Cormorant Garamond'; font-size: 1.6rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .wax-seal:hover { transform: translateX(-50%) scale(1.1); }
        .wax-seal::after { content: "🌿"; position: absolute; bottom: -10px; font-size: 1.8rem; }

        /* --- SITO PRINCIPALE --- */
        #main-content { display: none; opacity: 0; transition: opacity 2s; }

        /* Hero: La tua immagine a.jpg.jpeg */
        .hero {
            width: 100%; height: 100vh;
            background: url('a.jpg') no-repeat center center;
            background-size: cover; display: flex; align-items: flex-end; justify-content: center;
            position: relative; border-bottom: 10px solid white;
        }

        .hero-overlay {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            padding: 40px; text-align: center; width: 80%; max-width: 600px;
            border: 1px solid var(--salvia); margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 { font-family: 'Cormorant Garamond'; font-size: 3.5rem; color: var(--salvia); margin: 0; }
        h2 { font-family: 'Cormorant Garamond'; font-size: 2.5rem; color: var(--salvia); margin-bottom: 20px; }

        /* Countdown */
        .countdown-container {
            background: var(--salvia); color: white; padding: 40px 20px;
            display: flex; justify-content: space-around;
            max-width: 700px; margin: 50px auto;
            border: 1px solid white; outline: 3px solid var(--salvia); outline-offset: 6px;
        }
        .time-box span { display: block; font-size: 3rem; font-family: 'Cormorant Garamond'; }
        .time-box label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Sezioni Info */
        .info-section { padding: 80px 20px; text-align: center; max-width: 900px; margin: 0 auto; }
        
        .btn-maps {
            display: inline-block; padding: 15px 35px; background: var(--arancio-pastello);
            color: white; text-decoration: none; margin-top: 25px; letter-spacing: 2px;
            font-size: 0.8rem; transition: 0.3s; border-radius: 2px;
        }
        .btn-maps:hover { background: #e09b6e; letter-spacing: 4px; }

        /* Lista Nozze */
        .gift-box {
            background: #f4f6f4; border: 1px dashed var(--salvia);
            padding: 50px; margin: 60px auto; max-width: 600px;
        }

        /* Petali */
        .petal {
            position: fixed; width: 15px; height: 15px; background: #fff;
            border-radius: 150% 0 150% 100%; z-index: 1000; pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* Player YouTube Invisibile */
        #yt-player { position: absolute; top: -999px; left: -999px; }
    </style>
</head>
<body>

    <div id="envelope-wrapper" onclick="openWedding()">
        <div class="envelope">
            <div class="wax-seal">C & G</div>
        </div>
    </div>

    <div id="yt-player">
        <iframe id="video-frame" width="100" height="100" 
            src="https://www.youtube.com/embed/vGJTaP6anOU?enablejsapi=1" 
            frameborder="0">
        </iframe>
    </div>

    <div id="main-content">
        <div class="hero">
            <div class="hero-overlay">
                <p style="letter-spacing: 10px; margin-bottom: 10px;">SAVE THE DATE</p>

                <p style="font-style: italic; font-size: 1.2rem; margin-top: 15px;">03 Ottobre 2026</p>
            </div>
        </div>

        <div class="countdown-container">
            <div class="time-box"><span id="days">00</span><label>Giorni</label></div>
            <div class="time-box"><span id="hours">00</span><label>Ore</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Minuti</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Secondi</label></div>
        </div>

        <div class="info-section">

        </div>

        <hr style="width: 50px; border: 1px solid var(--arancio-pastello); margin: 40px auto;">
